<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>micro:bit シリアル ライブグラフ</title>
<style>
  :root { --bg:#0f1115; --panel:#171a21; --fg:#e6e9ef; --muted:#8b93a7; --accent:#4f9cff; --border:#2a2f3a; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
         background:var(--bg); color:var(--fg); height:100vh; display:flex; flex-direction:column; }
  header { padding:10px 14px; background:var(--panel); border-bottom:1px solid var(--border);
           display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  h1 { font-size:15px; margin:0 12px 0 0; font-weight:600; white-space:nowrap; }
  button { background:var(--accent); color:#fff; border:none; padding:7px 14px; border-radius:7px;
           font-size:13px; cursor:pointer; font-weight:600; }
  button.secondary { background:#2a2f3a; color:var(--fg); }
  button:disabled { opacity:.4; cursor:not-allowed; }
  label { font-size:12px; color:var(--muted); display:flex; align-items:center; gap:5px; }
  select, input[type=number] { background:#0d0f14; color:var(--fg); border:1px solid var(--border);
           border-radius:6px; padding:5px 7px; font-size:13px; }
  input[type=number] { width:78px; }
  #status { font-size:12px; color:var(--muted); margin-left:auto; white-space:nowrap; }
  #status.on { color:#3ddc84; }
  #wrap { flex:1; position:relative; }
  canvas { width:100%; height:100%; display:block; }
  #legend { position:absolute; top:10px; left:14px; display:flex; gap:14px; flex-wrap:wrap;
            font-size:12px; background:rgba(15,17,21,.65); padding:6px 10px; border-radius:8px; }
  .lg { display:flex; align-items:center; gap:6px; }
  .sw { width:12px; height:12px; border-radius:3px; }
  .val { font-variant-numeric: tabular-nums; font-weight:600; }
  #hint { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
          color:var(--muted); font-size:14px; pointer-events:none; }
</style>
</head>
<body>
<header>
  <h1>micro:bit ライブグラフ</h1>
  <button id="connect">接続</button>
  <button id="pause" class="secondary" disabled>一時停止</button>
  <button id="clear" class="secondary">クリア</button>
  <button id="save" class="secondary">CSV保存</button>
  <label>ボーレート
    <select id="baud">
      <option>9600</option><option selected>115200</option>
      <option>57600</option><option>38400</option><option>19200</option>
    </select>
  </label>
  <label>表示点数 <input id="window" type="number" value="600" min="50" max="20000" step="50"></label>
  <label>Y軸
    <select id="ymode">
      <option value="auto" selected>自動</option>
      <option value="adc">0–1023</option>
    </select>
  </label>
  <span id="status">未接続</span>
</header>
<div id="wrap">
  <canvas id="chart"></canvas>
  <div id="legend"></div>
  <div id="hint">「接続」を押して micro:bit のシリアルポートを選んでください<br>(Chrome / Edge のみ・他のシリアルモニタは閉じてください)</div>
</div>

<script>
const PALETTE = ["#4f9cff","#3ddc84","#ff8b3d","#e35ad6","#ffd23d","#5ad1e3","#ff5a6e","#b08bff"];
const $ = id => document.getElementById(id);

let port=null, reader=null, keepReading=false, paused=false;
const series = [];           // [{data:[], color, name}]
let maxLen = 600;

const canvas=$("chart"), ctx=canvas.getContext("2d");
function fit(){ const r=canvas.getBoundingClientRect(), d=window.devicePixelRatio||1;
  canvas.width=r.width*d; canvas.height=r.height*d; ctx.setTransform(d,0,0,d,0,0); }
window.addEventListener("resize", fit); fit();

// ---- serial ----
async function connect(){
  if(!("serial" in navigator)){ alert("このブラウザは Web Serial 非対応です。Chrome か Edge を使ってください。"); return; }
  try{
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: parseInt($("baud").value,10) });
  }catch(e){ return; } // ユーザーがキャンセル
  $("hint").style.display="none";
  setStatus(true);
  $("connect").textContent="切断";
  $("pause").disabled=false;
  keepReading=true;
  readLoop();
}
async function disconnect(){
  keepReading=false;
  try{ if(reader){ await reader.cancel(); } }catch(e){}
  try{ if(port){ await port.close(); } }catch(e){}
  port=null; reader=null;
  setStatus(false);
  $("connect").textContent="接続";
  $("pause").disabled=true;
}
async function readLoop(){
  const dec=new TextDecoderStream();
  const closed=port.readable.pipeTo(dec.writable).catch(()=>{});
  reader=dec.readable.getReader();
  let buf="";
  try{
    while(keepReading){
      const {value,done}=await reader.read();
      if(done) break;
      buf+=value;
      let nl;
      while((nl=buf.indexOf("\n"))>=0){
        const line=buf.slice(0,nl); buf=buf.slice(nl+1);
        if(!paused) handleLine(line);
      }
    }
  }catch(e){}
  try{ reader.releaseLock(); }catch(e){}
  await closed;
}

// ---- parse & store ----
function handleLine(raw){
  const line=raw.replace(/[\r\n]+/g,"").trim();
  if(!line) return;
  const nums = line.split(/[,\s;]+/).map(parseFloat).filter(v=>!Number.isNaN(v));
  if(!nums.length) return;
  for(let i=0;i<nums.length;i++){
    if(!series[i]){
      series[i]={ data:[], color:PALETTE[i%PALETTE.length], name:"ch"+i };
    }
    const arr=series[i].data;
    arr.push(nums[i]);
    if(arr.length>maxLen) arr.splice(0, arr.length-maxLen);
  }
  buildLegend();
}

function buildLegend(){
  const lg=$("legend");
  if(lg.childElementCount!==series.length){
    lg.innerHTML="";
    series.forEach((s,i)=>{
      const d=document.createElement("div"); d.className="lg";
      d.innerHTML=`<span class="sw" style="background:${s.color}"></span>`+
                  `<span>${s.name}</span><span class="val" id="v${i}">–</span>`;
      lg.appendChild(d);
    });
  }
  series.forEach((s,i)=>{
    const last=s.data[s.data.length-1];
    const el=$("v"+i); if(el) el.textContent=(last===undefined?"–":fmt(last));
  });
}
function fmt(v){ return Number.isInteger(v)?v:(Math.round(v*100)/100); }

// ---- draw ----
function draw(){
  const W=canvas.clientWidth, H=canvas.clientHeight;
  ctx.clearRect(0,0,W,H);
  const padL=52, padR=12, padT=14, padB=22;
  const x0=padL, x1=W-padR, y0=padT, y1=H-padB;

  // y range
  let lo=Infinity, hi=-Infinity;
  if($("ymode").value==="adc"){ lo=0; hi=1023; }
  else {
    for(const s of series) for(const v of s.data){ if(v<lo)lo=v; if(v>hi)hi=v; }
    if(!isFinite(lo)){ lo=0; hi=1; }
    if(lo===hi){ lo-=1; hi+=1; }
    const pad=(hi-lo)*0.08; lo-=pad; hi+=pad;
  }
  const Y=v=> y1-(v-lo)/(hi-lo)*(y1-y0);
  const X=(i,n)=> n<=1? x0 : x0+(i/(n-1))*(x1-x0);

  // grid + y labels
  ctx.strokeStyle="#232833"; ctx.fillStyle="#8b93a7"; ctx.lineWidth=1;
  ctx.font="11px system-ui"; ctx.textBaseline="middle";
  const TICKS=5;
  for(let t=0;t<=TICKS;t++){
    const yy=y0+(t/TICKS)*(y1-y0); const val=hi-(t/TICKS)*(hi-lo);
    ctx.beginPath(); ctx.moveTo(x0,yy); ctx.lineTo(x1,yy); ctx.stroke();
    ctx.fillText(fmt(val), 6, yy);
  }

  // lines
  for(const s of series){
    const n=s.data.length; if(n<2) continue;
    ctx.beginPath(); ctx.strokeStyle=s.color; ctx.lineWidth=1.6;
    for(let i=0;i<n;i++){ const px=X(i,n), py=Y(s.data[i]);
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py); }
    ctx.stroke();
  }
  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);

// ---- ui ----
function setStatus(on){ const s=$("status"); s.textContent=on?"接続中":"未接続"; s.className=on?"on":""; }
$("connect").onclick=()=> port?disconnect():connect();
$("pause").onclick=()=>{ paused=!paused; $("pause").textContent=paused?"再開":"一時停止"; };
$("clear").onclick=()=>{ for(const s of series) s.data.length=0; };
$("window").onchange=e=>{ maxLen=Math.max(50,parseInt(e.target.value,10)||600); };
$("save").onclick=()=>{
  const cols=series.length; if(!cols){ return; }
  const rows=Math.max(...series.map(s=>s.data.length));
  let csv=series.map(s=>s.name).join(",")+"\n";
  for(let r=0;r<rows;r++){
    csv+=series.map(s=>s.data[r]??"").join(",")+"\n";
  }
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="microbit_log.csv"; a.click();
};
window.addEventListener("beforeunload",()=>{ if(port) disconnect(); });
</script>
</body>
</html>
